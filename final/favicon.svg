<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cortex Favicon — simplified for 16-32px -->
  <rect width="32" height="32" rx="6" fill="#1A1A1A"/>
  <defs>
    <polygon id="r" points="16,5.5 15.2,16.4 16.8,16.4" fill="#D4A843"/>
  </defs>
  <g>
    <use href="#r" transform="rotate(0, 16, 16)"/>
    <use href="#r" transform="rotate(45, 16, 16)"/>
    <use href="#r" transform="rotate(90, 16, 16)"/>
    <use href="#r" transform="rotate(135, 16, 16)"/>
    <use href="#r" transform="rotate(180, 16, 16)"/>
    <use href="#r" transform="rotate(225, 16, 16)"/>
    <use href="#r" transform="rotate(270, 16, 16)"/>
    <use href="#r" transform="rotate(315, 16, 16)"/>
  </g>
</svg>
